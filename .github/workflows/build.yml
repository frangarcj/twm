name: TWM CI

on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:22-alpine

    steps:
    - name: Install git
      run: apk add --no-cache git
    - uses: actions/checkout@v2
    - name: Git Workaround
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Install dependencies
      run: |
        npm ci
    - name: Run tests
      run: |
        npm test
    - name: Test Report
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}       # run this step even if previous step failed
      with:
        name: JEST Tests            # Name of the check run which will be created
        path: reports/junit/junit.xml    # Path to test results
        reporter: jest-junit        # Format of test results
    - name: Coverage Report
      uses: ArtiomTr/jest-coverage-report-action@v2
      if: ${{ !cancelled() }}       # run this step even if previous step failed
      with:
        coverage-file: reports/coverage/coverage-final.json # Path to coverage file 
        base-coverage-file: reports/coverage/coverage-final.json # Path to base coverage file (optional)